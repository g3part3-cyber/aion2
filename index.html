<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성역 관리 시스템</title>
    <style>
        :root { --bg-dark: #0f1419; --panel-dark: rgba(30, 39, 46, 0.5); --accent-gold: #e0cdab; --btn-blue: #2980b9; --btn-red: #c0392b; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Malgun Gothic', sans-serif; }

        #app-container { 
            width: 400px; height: 620px; 
            background-color: var(--bg-dark); 
            border: 2px solid var(--accent-gold); 
            display: flex; flex-direction: column; 
            overflow: hidden; position: relative; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8); 
        }

        .tabs { display: flex; background: rgba(0,0,0,0.8); z-index: 10; }
        .tab-btn { flex: 1; padding: 15px 8px; border: none; background: none; color: #7f8c8d; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab-btn.active { color: var(--accent-gold); background: var(--panel-dark); border-bottom: 2px solid var(--accent-gold); }

        .main-content { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            padding-top: 20px; background-size: cover; background-position: center; 
            background-repeat: no-repeat; transition: background 0.5s ease;
        }
        .bg-ludra { background-image: linear-gradient(rgba(15,20,25,0.0), rgba(15,20,25,0.0)), url('bg_ludra.png'); }
        .bg-chimsik { background-image: linear-gradient(rgba(15,20,25,0.0), rgba(15,20,25,0.0)), url('bg_main.png'); }
        .bg-muspell { background-image: linear-gradient(rgba(15,20,25,0.0), rgba(15,20,25,0.0)), url('bg_muspell.png'); }

        h2 { color: var(--accent-gold); margin: 0 0 15px 0; font-size: 24px; text-shadow: 2px 2px 8px black; }

        input, select { 
            width: 250px; padding: 10px; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid var(--accent-gold); color: white; text-align: center; 
            font-size: 15px; margin-bottom: 8px; border-radius: 4px; outline: none;
        }
        input:focus, select:focus { border-color: #fff; box-shadow: 0 0 10px var(--accent-gold); }
        select option { background: #222; color: white; }

        .action-btn { width: 275px; padding: 10px; margin: 4px 0; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .action-btn:hover { filter: brightness(1.2); }
        .btn-cal { background: rgba(52, 73, 94, 0.8); color: var(--accent-gold); border: 1px solid var(--accent-gold); }
        .btn-search { background: var(--btn-blue); opacity: 0.9; }
        .btn-submit { background: var(--btn-red); opacity: 0.9; }

        #result-display { 
            width: 320px; height: 100px; margin-top: 15px; 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(224, 205, 171, 0.3); 
            border-radius: 5px; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 14px; line-height: 1.5; padding: 8px; color: white; white-space: pre-wrap; 
        }

        #cal-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: rgba(0,0,0,0.95); border: 2px solid var(--accent-gold); z-index: 100; padding: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 10px; color: white; }
        .cal-day { padding: 8px 0; cursor: pointer; border-radius: 3px; font-size: 12px; }
        .cal-day:hover { background: var(--accent-gold); color: black; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="tabs">
        <button id="btn-ludra" class="tab-btn active" onclick="switchTab('ludra', 2700)">루드라</button>
        <button id="btn-chimsik" class="tab-btn" onclick="switchTab('chimsik', 3500)">침식된</button>
        <button id="btn-muspell" class="tab-btn" onclick="switchTab('muspell', 4300)">무스펠</button>
    </div>

    <div id="main-area" class="main-content bg-ludra">
        <h2 id="title">⚔ 루드라 성역</h2>
        <input type="text" id="char-name" placeholder="캐릭터명 입력 후 엔터" onkeypress="if(event.keyCode==13) fetchData()">
        
        <div id="time-area">
            <select id="raid-time">
                <option value="7시~8시">시간: 7시 ~ 8시</option>
                <option value="8시~9시">시간: 8시 ~ 9시</option>
                <option value="9시~10시">시간: 9시 ~ 10시</option>
                <option value="11시이상">시간: 11시 이상</option>
            </select>
        </div>

        <div id="diff-area" style="display: none;">
            <select id="difficulty" onchange="resetSelection()">
                <option value="보통">난이도: 보통 (Lv 4300↑)</option>
                <option value="어려움">난이도: 어려움 (Lv 4500↑)</option>
            </select>
        </div>

        <button class="action-btn btn-cal" onclick="toggleCal()">📅 날짜 선택</button>
        <div id="date-text" style="color: var(--accent-gold); margin: 3px 0; font-weight: bold; text-shadow: 1px 1px 2px black;">날짜: 설정 중...</div>
        
        <button class="action-btn btn-search" onclick="fetchData()">정보 조회</button>
        <button class="action-btn btn-submit" onclick="submitData()">참여 체크</button>
        <div id="result-display">캐릭터명을 조회해 주세요.</div>
    </div>

    <div id="cal-modal">
        <div style="display:flex; justify-content: space-between; align-items: center; color: white;">
            <button onclick="moveMonth(-1)">&lt;</button>
            <b id="cal-title">2026.04</b>
            <button onclick="moveMonth(1)">&gt;</button>
        </div>
        <div class="cal-grid" id="cal-body"></div>
        <button onclick="toggleCal()" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:8px; cursor:pointer;">닫기</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyc-ubmUsuP7pfBsvVMd55iT5m1v0KWTWxtoNC8cdcqEoLZAF6AHkUbaCJFLh5VN09Yjw/exec";
    const LUDRA_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScrzEVn9LGM0ZYYe0c4zb872cr0jiPv_nzRPbvEe6fPRouo8g/formResponse";
    const CHIMSIK_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdMCK4YAeyg8el3ALNaALCCW3-li_fpWPebu8ICpDDQkgD8zg/formResponse";
    const MUSPELL_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeVxOs4bvl6XB9ijHETtGTfi2tjWntBT1Db1Nzyji1hg1jwBA/formResponse";

    let currentTab = "루드라";
    let currentMinLv = 2700; 
    let selectedChar = null;
    let targetDate = new Date();
    let viewDate = new Date();

    document.getElementById('date-text').innerText = `날짜: ${formatDate(targetDate)}`;

    function resetSelection() {
        selectedChar = null;
        document.getElementById('result-display').innerText = "조건이 변경되었습니다.\n다시 조회해 주세요.";
        document.getElementById('result-display').style.color = "white";
    }

    function switchTab(type, lv) {
        const map = { ludra: "루드라", chimsik: "침식된", muspell: "무스펠" };
        const titleMap = { ludra: "⚔ 루드라 성역", chimsik: "🔥 침식된 성역", muspell: "🔥 무스펠 성역" };
        const bgMap = { ludra: "bg-ludra", chimsik: "bg-chimsik", muspell: "bg-muspell" };
        currentTab = map[type];
        currentMinLv = lv;

        document.getElementById('main-area').className = "main-content " + bgMap[type];
        document.getElementById('title').innerText = titleMap[type];
        ['ludra','chimsik','muspell'].forEach(t => {
            document.getElementById('btn-' + t).classList.toggle('active', t === type);
        });

        document.getElementById('diff-area').style.display = (type === 'muspell') ? 'block' : 'none';
        document.getElementById('raid-time').selectedIndex = 0;
        
        resetSelection();
        document.getElementById('result-display').innerText = "캐릭터명을 조회해 주세요.";
    }

    async function fetchData() {
        const inputName = document.getElementById('char-name').value.trim();
        if (!inputName) return alert("이름을 입력하세요.");
        const resDiv = document.getElementById('result-display');
        resDiv.innerText = "데이터를 불러오는 중...";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const user = data.find(row => String(row[0]).trim() === inputName);

            if (user) {
                let powerVal = String(user[4] || "0");
                let displayPower = powerVal.toUpperCase().includes('K') ? powerVal : powerVal + "K";
                const charLv = parseInt(String(user[5] || "0").replace(/[^0-9]/g, ''));
                const isCleared = String(user[6] || "").trim().toUpperCase() === "O";

                let requiredLv = currentMinLv;
                if (currentTab === "무스펠") {
                    const diff = document.getElementById('difficulty').value;
                    requiredLv = (diff === "어려움") ? 4500 : 4300;
                }

                const isLvPass = charLv >= requiredLv;
                let isConditionPass = (currentTab === "침식된") ? (isLvPass && isCleared) : isLvPass;

                if (isConditionPass) {
                    selectedChar = { name: user[0], class: user[1], power: displayPower, lv: charLv };
                    resDiv.style.color = "#4da6ff";
                    resDiv.innerText = `▶ 조회 성공 ◀\n\n캐릭터: ${user[0]}\n레벨: ${user[5]}\n전투력: ${displayPower}`;
                } else {
                    selectedChar = null;
                    resDiv.style.color = "#ff4d4d";
                    if (currentTab === "침식된" && !isCleared) {
                        resDiv.innerText = `❌ 성역2 클리어 필요 ❌\n'O' 표시된 인원만 신청 가능합니다.`;
                    } else {
                        resDiv.innerText = `❌ 입장 레벨 부족 ❌\n최소 ${requiredLv}레벨 필요\n(현재 레벨: ${user[5]})`;
                    }
                }
            } else {
                selectedChar = null;
                resDiv.innerText = "정보가 없습니다.";
                resDiv.style.color = "#ff5c5c";
            }
        } catch (e) { resDiv.innerText = "데이터 로드 실패"; }
    }

    async function submitData() {
        if (!selectedChar) return alert("신청 가능한 캐릭터가 아닙니다.");
        let targetFormUrl = (currentTab === "루드라") ? LUDRA_FORM_URL : (currentTab === "침식된") ? CHIMSIK_FORM_URL : MUSPELL_FORM_URL;

        const formData = new FormData();
        formData.append("entry.1885401070", selectedChar.name);
        formData.append("entry.1597772281", selectedChar.class || "미정");
        formData.append("entry.2119139776", selectedChar.power);
        formData.append("entry.811558296", currentTab);

        // 날짜 데이터 쪼개서 전송
        formData.append("entry.1568093931_year", targetDate.getFullYear());
        formData.append("entry.1568093931_month", String(targetDate.getMonth() + 1).padStart(2, '0'));
        formData.append("entry.1568093931_day", String(targetDate.getDate()).padStart(2, '0'));

        // [수정 핵심] 탭에 맞춰 개별적인 시간 entry ID로 데이터를 주입합니다.
        const selectedTime = document.getElementById('raid-time').value;
        if (currentTab === "루드라") {
            formData.append("entry.343454175", selectedTime);
        } else if (currentTab === "침식된") {
            formData.append("entry.371015671", selectedTime);
        } else if (currentTab === "무스펠") {
            formData.append("entry.1081890562", selectedTime);
            
            // 무스펠일 때 난이도 값도 추가 전송
            const diffVal = document.getElementById('difficulty').value;
            formData.append("entry.1144998178", diffVal); 
        }

        try {
            await fetch(targetFormUrl, { method: "POST", mode: "no-cors", body: formData });
            const msgSuffix = currentTab === "무스펠" ? `[무스펠 - ${document.getElementById('difficulty').value}]` : `[${currentTab}]`;
            alert(`${selectedChar.name}님 ${msgSuffix} (${selectedTime}) 신청 완료!`);
        } catch (e) { alert("전송 오류"); }
    }

    function formatDate(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0'); }
    function toggleCal() { const m = document.getElementById('cal-modal'); m.style.display = (m.style.display === 'block' ? 'none' : 'block'); if(m.style.display === 'block') renderCal(); }
    function renderCal() {
        const body = document.getElementById('cal-body');
        const title = document.getElementById('cal-title');
        body.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        title.innerText = `${y}.${String(m+1).padStart(2, '0')}`;
        ['일','월','화','수','목','금','토'].forEach(d => { const h = document.createElement('div'); h.innerText = d; h.style.color = '#aaa'; body.appendChild(h); });
        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m+1, 0).getDate();
        for(let i=0; i<firstDay; i++) body.appendChild(document.createElement('div'));
        for(let i=1; i<=lastDate; i++) {
            const d = document.createElement('div'); d.innerText = i; d.className = 'cal-day';
            d.onclick = () => { targetDate = new Date(y, m, i); document.getElementById('date-text').innerText = `날짜: ${formatDate(targetDate)}`; toggleCal(); };
            body.appendChild(d);
        }
    }
    function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCal(); }
</script>
</body>
</html>
