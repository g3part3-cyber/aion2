<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성역 관리 시스템</title>
    <style>
        /* ========================================================
           [수정] CSS 변수를 체계적으로 분리하여 유지보수성 향상
           - 색상, 간격, 테두리 등 디자인 토큰을 한곳에서 관리
           ======================================================== */
        :root {
            /* ── 기본 색상 테마 ── */
            --bg-dark: #0f1419;
            --panel-dark: rgba(30, 39, 46, 0.5);
            --accent-gold: #e0cdab;

            /* ── 액션 버튼 색상 ── */
            --btn-blue: #2980b9;
            --btn-red: #c0392b;
            --btn-gray: rgba(52, 73, 94, 0.8);
            --btn-green: #27ae60; 

            /* ── 상태 메시지 색상 ── */
            --color-success: #4da6ff;   
            --color-error:   #ff4d4d;   
            --color-warning: #ff9f43;   

            /* ── 레이아웃 토큰 ── */
            --app-width: 400px;
            --app-height: 620px;
            --border-radius: 4px;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
        }

        @media (max-width: 450px) {
            :root { --app-width: 95vw; }
        }

        #app-container {
            width: var(--app-width);
            height: var(--app-height);
            background-color: var(--bg-dark);
            border: 2px solid var(--accent-gold);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            box-sizing: border-box; 
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 8px;
            border: none;
            background: none;
            color: #7f8c8d;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .tab-btn.active {
            color: var(--accent-gold);
            background: var(--panel-dark);
            border-bottom: 2px solid var(--accent-gold);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.5s ease;
        }

        .bg-ludra,
        .bg-chimsik,
        .bg-muspell {
            background-image: linear-gradient(rgba(15, 20, 25, 0.8), rgba(15, 20, 25, 0.9));
        }

        .bg-ludra    { background-image: url('bg_ludra.png'),      linear-gradient(rgba(15,20,25,0.8), rgba(15,20,25,0.9)); }
        .bg-chimsik  { background-image: url('bg_main.png'),       linear-gradient(rgba(15,20,25,0.8), rgba(15,20,25,0.9)); }
        .bg-muspell  { background-image: url('bg_muspell.png'),    linear-gradient(rgba(15,20,25,0.8), rgba(15,20,25,0.9)); }

        h2 {
            color: var(--accent-gold);
            margin: 0 0 15px 0;
            font-size: 24px;
            text-shadow: 2px 2px 8px black;
        }

        input, select {
            width: 250px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--accent-gold);
            color: white;
            text-align: center;
            font-size: 15px;
            margin-bottom: 8px;
            border-radius: var(--border-radius);
            outline: none;
        }

        input:focus, select:focus {
            border-color: #fff;
            box-shadow: 0 0 10px var(--accent-gold);
        }

        select option { background: #222; color: white; }

        .status-badge {
            color: var(--color-warning);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px black;
        }

        .action-btn {
            width: 275px;
            padding: 10px;
            margin: 4px 0;
            border: none;
            border-radius: var(--border-radius);
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: filter 0.2s, transform 0.1s; 
        }

        .action-btn:hover  { filter: brightness(1.2); }
        .action-btn:active { transform: scale(0.97); } 

        .btn-cal  { background: var(--btn-gray); color: var(--accent-gold); border: 1px solid var(--accent-gold); }
        .btn-search { background: var(--btn-blue); opacity: 0.9; }
        .btn-submit { background: var(--btn-red); opacity: 0.9; }
        .btn-participants { background: var(--btn-green); opacity: 0.9; } 

        #result-display {
            width: 320px;
            height: 100px;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(224, 205, 171, 0.3);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
            padding: 8px;
            color: white;
            white-space: pre-wrap;
        }

        #cal-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid var(--accent-gold);
            z-index: 100;
            padding: 15px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
            margin-top: 10px;
            color: white;
        }

        .cal-day { padding: 8px 0; cursor: pointer; border-radius: 3px; font-size: 12px; }
        .cal-day:hover { background: var(--accent-gold); color: black; }

        /* ========================================================
           참여자 목록 모달 레이아웃 스타일
           ======================================================== */
        #participants-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 480px;
            background: rgba(10, 15, 20, 0.98);
            border: 2px solid var(--accent-gold);
            z-index: 200;
            padding: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            box-sizing: border-box;
            border-radius: 6px;
        }

        .p-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(224, 205, 171, 0.3);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .p-modal-title {
            color: var(--accent-gold);
            font-size: 16px;
            font-weight: bold;
        }

        .p-modal-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .p-modal-close:hover { color: white; }

        .p-modal-body {
            width: 100%;
            height: calc(100% - 40px);
            overflow-y: auto;
            color: white;
            font-family: 'Malgun Gothic', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            text-align: left;
            padding-right: 5px;
        }
        .p-modal-body::-webkit-scrollbar { width: 6px; }
        .p-modal-body::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 3px; }
        .p-modal-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div id="app-container">
    <div class="tabs" role="tablist">
        <button id="btn-ludra"   class="tab-btn active" onclick="switchTab('ludra', 2700)" aria-selected="true">루드라</button>
        <button id="btn-chimsik" class="tab-btn"         onclick="switchTab('chimsik', 3500)" aria-selected="false">침식된</button>
        <button id="btn-muspell" class="tab-btn"         onclick="switchTab('muspell', 4300)" aria-selected="false">무스펠</button>
    </div>

    <div id="main-area" class="main-content bg-ludra" role="region" aria-label="성역 정보 조회 영역">
        <h2 id="title">⚔ 루드라 성역</h2>
        <input type="text" id="char-name" placeholder="캐릭터명 입력 후 엔터">

        <div id="time-area">
            <select id="raid-time" aria-label="레이드 시간 선택">
                <option value="7시~8시">시간: 7시 ~ 8시</option>
                <option value="8시~9시">시간: 8시 ~ 9시</option>
                <option value="9시~10시">시간: 9시 ~ 10시</option>
                <option value="10시~11시">시간: 10시 ~ 11시</option>
                <option value="11시이상">시간: 11시 이상</option>
            </select>
        </div>

        <div id="try-area" class="status-badge" style="display: none;">ℹ️ 조회 시 클리어 기록에 따라 완숙/트라이 자동 판정</div>

        <div id="diff-area" style="display: none;">
            <select id="difficulty" onchange="resetSelection()" aria-label="난이도 선택">
                <option value="보통">난이도: 보통 (Lv 4300↑)</option>
                <option value="어려움">난이도: 어려움 (Lv 4500↑)</option>
            </select>
        </div>

        <button class="action-btn btn-cal" onclick="toggleCal()" aria-label="날짜 선택 달력 열기">📅 날짜 선택</button>
        <div id="date-text" style="color: var(--accent-gold); margin: 3px 0; font-weight: bold; text-shadow: 1px 1px 2px black;">날짜: 설정 중...</div>

        <button class="action-btn btn-search" onclick="fetchData()" aria-label="캐릭터 정보 조회">정보 조회</button>
        <button class="action-btn btn-submit" onclick="submitData()" aria-label="신청 제출">참여 체크</button>
        
        <!-- 참여자 보기 버튼 -->
        <button class="action-btn btn-participants" onclick="toggleParticipantsModal()" aria-label="이번 주 참여자 명단 보기">👥 참여자 보기</button>

        <div id="result-display" role="status" aria-live="polite">캐릭터명을 조회해 주세요.</div>
    </div>

    <!-- 달력 모달 -->
    <div id="cal-modal" role="dialog" aria-label="날짜 선택">
        <div style="display:flex; justify-content: space-between; align-items: center; color: white;">
            <button onclick="moveMonth(-1)" aria-label="이전 달">&lt;</button>
            <b id="cal-title">2026.04</b>
            <button onclick="moveMonth(1)" aria-label="다음 달">&gt;</button>
        </div>
        <div class="cal-grid" id="cal-body"></div>
        <button onclick="toggleCal()" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:8px; cursor:pointer;">닫기</button>
    </div>

    <!-- 참여자 조회 출력 모달 -->
    <div id="participants-modal" role="dialog" aria-label="이번 주 명단">
        <div class="p-modal-header">
            <!-- [변경] 현재 열린 성역 이름이 타이틀에 표시되도록 연동 -->
            <span id="p-modal-title" class="p-modal-title">📋 명단 조회</span>
            <button class="p-modal-close" onclick="toggleParticipantsModal()">&times;</button>
        </div>
        <div id="participants-body" class="p-modal-body">조회 중...</div>
    </div>
</div>

<script>
const CONFIG = {
    api: "https://script.google.com/macros/s/AKfycbyc-ubmUsuP7pfBsvVMd55iT5m1v0KWTWxtoNC8cdcqEoLZAF6AHkUbaCJFLh5VN09Yjw/exec",
    forms: {
        ludra:   "https://docs.google.com/forms/d/e/1FAIpQLScrzEVn9LGM0ZYYe0c4zb872cr0jiPv_nzRPbvEe6fPRouo8g/formResponse",
        chimsik: "https://docs.google.com/forms/d/e/1FAIpQLSdMCK4YAeyg8el3ALNaALCCW3-li_fpWPebu8ICpDDQkgD8zg/formResponse",
        muspell: "https://docs.google.com/forms/d/e/1FAIpQLSeVxOs4bvl6XB9ijHETtGTfi2tjWntBT1Db1Nzyji1hg1jwBA/formResponse",
    },
    raidLv: {
        ludra:   2700,
        chimsik: 3500,
        muspell: 4300, 
    },
    difficultyBonus: {
        "어려움": 200,
        "보통":   0,
    },
    tabNames: { ludra: "루드라", chimsik: "침식", muspell: "무스펠" }, /* [수정] 백엔드 키값 규격 매핑 일치 */
    tabTitles: {
        ludra: "⚔ 루드라 성역",
        chimsik: "🔥 침식된 성역",
        muspell: "🔥 무스펠 성역",
    },
    tabBgClasses: { ludra: "bg-ludra", chimsik: "bg-chimsik", muspell: "bg-muspell" },

    formEntries: {
        ludra: {
            name:   "entry.1885401070",
            class:  "entry.1597772281",
            power:  "entry.2119139776",
            tab:    "entry.811558296",
            dateY:  "entry.1568093931_year",
            dateM:  "entry.1568093931_month",
            dateD:  "entry.1568093931_day",
            time:   "entry.343454175",
            difficulty: null, 
        },
        chimsik: {
            name:       "entry.1885401070",
            class:      "entry.1597772281",
            power:      "entry.2119139776",
            tab:        "entry.811558296",
            dateY:      "entry.1568093931_year",
            dateM:      "entry.1568093931_month",
            dateD:      "entry.1568093931_day",
            time:       "entry.371015671",
            difficulty: "entry.1920727946", 
        },
        muspell: {
            name:       "entry.1885401070",
            class:      "entry.1597772281",
            power:      "entry.2119139776",
            tab:        "entry.811558296",
            dateY:      "entry.1568093931_year",
            dateM:      "entry.1568093931_month",
            dateD:      "entry.1568093931_day",
            time:       "entry.1081890562",
            difficulty: "entry.1144998178",
        },
    },
    alertMessages: {
        ludra:   (name, tab, time) => `${name}님 [${tab}] (${time}) 신청 완료!`,
        chimsik: (name, tab, type, time) => `${name}님 [${tab} - ${type}] (${time}) 신청 완료!`,
        muspell: (name, tab, diff, time) => `${name}님 [${tab} - ${diff}] (${time}) 신청 완료!`,
    },
    successTitles: {
        ludra:   "▶ 조회 성공 ◀",
        chimsik: (isCleared) => isCleared ? "▶ 완숙 신청 가능 ◀" : "▶ 트라이 신청 가능 ◀",
        muspell: "▶ 조회 성공 ◀",
    },
};

const $ = (id) => document.getElementById(id);

const state = {
    currentTab: "ludra",      
    selectedChar: null,       
    targetDate: new Date(),   
    viewDate: new Date(),     
};

$("date-text").innerText = `날짜: ${formatDate(state.targetDate)}`;

function switchTab(type, lv) {
    if (state.currentTab === type) return;

    state.currentTab = type;

    $("main-area").className = "main-content " + CONFIG.tabBgClasses[type];
    $("title").innerText     = CONFIG.tabTitles[type];

    ["ludra", "chimsik", "muspell"].forEach((t) => {
        const btn = $("btn-" + t);
        btn.classList.toggle("active", t === type);
        btn.setAttribute("aria-selected", t === type ? "true" : "false"); 
    });

    $("diff-area").style.display = (type === "muspell") ? "block" : "none";
    $("try-area").style.display  = (type === "chimsik") ? "block" : "none";
    $("raid-time").selectedIndex = 0;

    resetSelection();
}

document.getElementById("char-name").addEventListener("keypress", (e) => {
    if (e.key === "Enter") fetchData();
});

function resetSelection() {
    state.selectedChar = null;
    $("result-display").innerText = "조건이 변경되었습니다.\n다시 조회해 주세요.";
    $("result-display").style.color = "white";
}

async function fetchData() {
    const inputName = $("char-name").value.trim();
    if (!inputName) return alert("이름을 입력하세요.");

    const resDiv = $("result-display");
    resDiv.innerText = "데이터를 불러오는 중...";
    resDiv.style.color = "white"; 

    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); 

        const response = await fetch(CONFIG.api, { signal: controller.signal });
        clearTimeout(timeoutId);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const user = data.find(row => String(row[0]).trim() === inputName);

        if (!user) {
            state.selectedChar = null;
            resDiv.innerText  = "정보가 없습니다.";
            resDiv.style.color = "#ff5c5c";
            return;
        }

        const powerVal = String(user[4] || "0");
        const displayPower = powerVal.toUpperCase().includes("K") ? powerVal : powerVal + "K";
        const charLv = parseInt(String(user[5] || "0").replace(/[^0-9]/g, ""));

        let requiredLv = CONFIG.raidLv[state.currentTab];

        if (state.currentTab === "muspell") {
            const diff = $("difficulty").value;
            requiredLv += CONFIG.difficultyBonus[diff] || 0;
        }

        const isCleared = String(user[6] || "").trim().toUpperCase() === "O";

        if (charLv >= requiredLv) {
            state.selectedChar = {
                name:     user[0],
                class:    user[1],
                power:    displayPower,
                lv:       charLv,
                type: (state.currentTab === "chimsik") ? (isCleared ? "완숙" : "트라이") : null,
            };

            resDiv.style.color = "#4da6ff";

            const successTitleFn = CONFIG.successTitles[state.currentTab];
            const titleText = typeof successTitleFn === "function" ? successTitleFn(isCleared) : successTitleFn;

            resDiv.innerText =
                `${titleText}\n\n캐릭터: ${user[0]}\n레벨: ${user[5]}\n전투력: ${displayPower}`;
        } else {
            state.selectedChar = null;
            resDiv.style.color = "#ff4d4d";
            resDiv.innerText   = `❌ 입장 레벨 부족 ❌\n최소 ${requiredLv}레벨 필요\n(현재 레벨: ${user[5]})`;
        }

    } catch (e) {
        if (e.name === "AbortError") {
            $("result-display").innerText = "⏱ 응답 시간이 초과되었습니다.";
        } else {
            $("result-display").innerText = "데이터 로드 실패";
        }
        $("result-display").style.color = "#ff5c5c";
    }
}

async function submitData() {
    if (!state.selectedChar) return alert("신청 가능한 캐릭터가 아닙니다.");

    const tab = state.currentTab;
    const formUrl = CONFIG.forms[tab];
    const entries = CONFIG.formEntries[tab];
    const formData = new FormData();

    formData.append(entries.name,      state.selectedChar.name);
    formData.append(entries.class,     state.selectedChar.class || "미정");
    formData.append(entries.power,     state.selectedChar.power);
    formData.append(entries.tab,       CONFIG.tabNames[tab]);

    formData.append(entries.dateY,      String(state.targetDate.getFullYear()));
    formData.append(entries.dateM,      String(state.targetDate.getMonth() + 1).padStart(2, '0'));
    formData.append(entries.dateD,      String(state.targetDate.getDate()).padStart(2, '0'));

    const selectedTime = $("raid-time").value;
    formData.append(entries.time, selectedTime);

    if (entries.difficulty !== null) {
        const diffVal = (tab === "muspell") ? $("difficulty").value : state.selectedChar.type;
        formData.append(entries.difficulty, diffVal);
    }

    try {
        await fetch(formUrl, { method: "POST", mode: "no-cors", body: formData });

        const msgFn = CONFIG.alertMessages[tab];
        let alertMsg;

        if (tab === "muspell") {
            alertMsg = msgFn(state.selectedChar.name, CONFIG.tabNames[tab], $("difficulty").value, selectedTime);
        } else if (tab === "chimsik") {
            alertMsg = msgFn(state.selectedChar.name, CONFIG.tabNames[tab], state.selectedChar.type, selectedTime);
        } else {
            alertMsg = msgFn(state.selectedChar.name, CONFIG.tabNames[tab], selectedTime);
        }

        alert(alertMsg);
    } catch (e) {
        alert("전송 오류");
    }
}

function formatDate(d) {
    return d.getFullYear() + "-" +
           String(d.getMonth() + 1).padStart(2, '0') + "-" +
           String(d.getDate()).padStart(2, '0');
}

const calModal   = $("cal-modal");
const calBody    = $("cal-body");
const calTitleEl = $("cal-title");

function toggleCal() {
    const isShowing = calModal.style.display === "block";
    calModal.style.display = isShowing ? "none" : "block";

    if (!isShowing) renderCal();
    else calBody.innerHTML = "";
}

function renderCal() {
    const y = state.viewDate.getFullYear();
    const m = state.viewDate.getMonth();
    calTitleEl.innerText = `${y}.${String(m + 1).padStart(2, '0')}`;
    calBody.innerHTML = "";

    ["일", "월", "화", "수", "목", "금", "토"].forEach(day => {
        const el = document.createElement("div");
        el.innerText = day;
        el.style.color = "#aaa";
        calBody.appendChild(el);
    });

    const firstDay  = new Date(y, m, 1).getDay();
    const lastDate  = new Date(y, m + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        calBody.appendChild(document.createElement("div"));
    }

    for (let d = 1; d <= lastDate; d++) {
        const dayEl = document.createElement("div");
        dayEl.innerText = d;
        dayEl.className = "cal-day";

        dayEl.addEventListener("click", () => {
            state.targetDate = new Date(y, m, d);
            $("date-text").innerText = `날짜: ${formatDate(state.targetDate)}`;
            toggleCal();
        });

        calBody.appendChild(dayEl);
    }
}

function moveMonth(n) {
    state.viewDate.setMonth(state.viewDate.getMonth() + n);
    renderCal();
}

/** ========================================================
  * [수정 및 기능 추가] 
  * 1. 타이틀 변경 연동 (예: 📋 루드라 명단)
  * 2. 선택된 탭에 대응하는 명단만 필터링 출력
  * 3. 명단 옆에 (전투력) 매핑 구현
  * ======================================================== */
function toggleParticipantsModal() {
    const pModal = $("participants-modal");
    const isShowing = pModal.style.display === "block";
    
    if (isShowing) {
        pModal.style.display = "none";
    } else {
        pModal.style.display = "block";
        // 상단 타이틀을 현재 활성화된 탭 이름으로 변경
        $("p-modal-title").innerText = `📋 ${CONFIG.tabTitles[state.currentTab]} 명단`;
        fetchWeeklyParticipants();
    }
}

async function fetchWeeklyParticipants() {
    const pBody = $("participants-body");
    pBody.innerText = "명단을 불러오는 중입니다...";
    
    try {
        const requestUrl = CONFIG.api + "?mode=participants";
        const response = await fetch(requestUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const result = await response.json();
        
        if (result.status === "success") {
            renderParticipantsData(result.data);
        } else {
            pBody.innerText = "오류가 발생했습니다:\n" + (result.message || "알 수 없는 에러");
        }
    } catch (error) {
        pBody.innerText = "데이터 로드 실패:\n" + error.toString();
    }
}

function renderParticipantsData(data) {
    const pBody = $("participants-body");
    
    // 현재 선택된 탭 객체의 매핑 데이터 키 추출 ("루드라", "침식", "무스펠")
    const currentKey = CONFIG.tabNames[state.currentTab];
    const list = data[currentKey];
    
    let textOutput = `===== 이번 주 신청 현황 =====\n\n`;
    
    if (list && list.length > 0) {
        list.forEach((item, index) => {
            // 백엔드 데이터 포맷 대응 유연화 처리
            // 1. 객체/배열 형태 형태의 데이터인 경우 {name: '홍길동', power: '4500K'}
            if (typeof item === 'object' && item !== null) {
                const name = item.name || "이름 없음";
                const power = item.power ? `(${item.power})` : "";
                textOutput += `${index + 1}. ${name} ${power}\n`;
            } 
            // 2. 이미 문자열로 합쳐져서 넘어오는 경우 (예: "홍길동 (4200K)")
            else if (typeof item === 'string') {
                textOutput += `${index + 1}. ${item}\n`;
            }
        });
    } else {
        textOutput += "신청된 내역이 없습니다.\n";
    }
    
    pBody.innerText = textOutput;
}
</script>
